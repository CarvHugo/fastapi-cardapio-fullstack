<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Cardápio</title>
</head>
<body onload="buscar()">
    
    <h1 class="cabecalho">
        Cardápio
    </h1>

    <input
    type="text"
    id="campo-busca"
    onkeydown="pressionouEnter(event)"
    >

    <button onclick="busca_personalizada()">
        Buscar
    </button>
    
    
    <script>

        function pressionouEnter(event) {
            if (event.key === "Enter") {
                busca_personalizada()
            }
        }

        async function busca_personalizada() {
            const campo = document.getElementById("campo-busca")
            const nome = campo.value

            const resposta = await fetch(`https://fastapi-cardapio-api.onrender.com/produtos?nome=${nome}`)
            const dados = await resposta.json()

            const div = document.getElementById("cardapio");
            div.innerHTML = "";

            dados.forEach(item => {
                div.innerHTML += `
                    <div class="produto">
                        <img class="imagem-produto" src="imagens/produtos/spaghetti1.jpg">
                        <p>
                            <strong>${item.nome}</strong><br>

                                Categoria: ${item.categoria}<br>

                                Preço:
                                R$ ${Number(item.preco).toLocaleString(
                                    "pt-BR",
                                    { minimumFractionDigits: 2 }
                                )}
                        </p>
                    </div>
                `
            })

        }

    </script>

    <div id="cardapio"></div>
    
    <script>
        async function buscar() {
            const resposta = await fetch("https://fastapi-cardapio-api.onrender.com/produtos");
            const dados = await resposta.json();

            const div = document.getElementById("cardapio");
            div.innerHTML = "";

            div.innerHTML = `
                <h2 class="titulo">
                    Massas
                </h2>
                
                <div class="categoria"></div>
            `;

            const categoria = document.querySelector(".categoria");

            dados.forEach(item => {
                if (item.categoria === "Massas") {
                    categoria.innerHTML += `
                        <div class="produto">
                            <img class="imagem-produto" src="imagens/produtos/spaghetti1.jpg">
                            
                            <p>
                                <strong>${item.nome}</strong><br>

                                Preço:
                                R$ ${Number(item.preco).toLocaleString(
                                    "pt-BR",
                                    { minimumFractionDigits: 2 }
                                )}
                            </p>
                        </div>
                    `;  
                }
                else if (item.categoria === "Pizzas") {
                    categoria.innerHTML += ``
                }
            });
        }
    </script>

</body>
</html>
</body>
</html>
